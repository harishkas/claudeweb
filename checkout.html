<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | HAKS SHOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .checkout-section {
            padding: 100px 8% 80px;
            min-height: 100vh;
        }

        .checkout-section h2 {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
        }

        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .checkout-form, .checkout-summary {
            background: var(--card-light);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
        }

        .checkout-form h3, .checkout-summary h3 {
            margin-bottom: 25px;
            font-size: 22px;
        }

        .checkout-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
        }

        .checkout-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkout-form button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .checkout-form button:hover {
            transform: translateY(-2px);
        }

        .checkout-summary {
            max-height: 600px;
            overflow-y: auto;
        }

        #checkoutItems {
            margin-bottom: 20px;
        }

        #checkoutTotal {
            font-size: 24px;
            color: #667eea;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
        }

        @media (max-width: 900px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar">
        <div class="logo">HAKS SHOP</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="login.html" class="user-auth-link"><i class="fa-solid fa-user"></i> Login</a></li>
        </ul>
    </nav>
</header>

<!-- CHECKOUT SECTION -->
<section class="checkout-section">
    <h2>Complete Your Purchase</h2>

    <div class="checkout-container">

        <!-- LEFT: ADDRESS FORM -->
        <div class="checkout-form">
            <h3>Delivery Details</h3>

            <form id="checkoutForm">
                <input type="text" id="fullName" placeholder="Full Name" required>
                <input type="text" id="address" placeholder="Full Address" required>
                <input type="text" id="city" placeholder="City" required>
                <input type="text" id="pincode" placeholder="Pincode" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>

                <button type="submit">Place Order</button>
            </form>
        </div>

        <!-- RIGHT: ORDER SUMMARY -->
        <div class="checkout-summary">
            <h3>Order Summary</h3>
            <div id="checkoutItems">
                <p style="text-align:center; color:#6b7280;">Loading...</p>
            </div>
            <h3 id="checkoutTotal">Total: ₹0</h3>
        </div>

    </div>
</section>

<footer>
    <p><strong>HAKS SHOP</strong> – Your One Stop Fashion Destination</p>
    <p>&copy; 2026 HAKS SHOP. All Rights Reserved.</p>
</footer>

<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    loadCheckoutSummary();
});

document.getElementById("checkoutForm").addEventListener("submit", function(e){
    e.preventDefault();
    
    const userId = localStorage.getItem("user_id");
    if (!userId) {
        showToast("Please login first");
        setTimeout(() => location.href = "login.html", 1000);
        return;
    }
    
    showToast("Order placed successfully! 🎉");
    
    setTimeout(() => {
        location.href = "index.html";
    }, 2000);
});
</script>
</body>
</html>
