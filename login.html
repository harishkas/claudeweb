<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | HAKS SHOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 28px;
            color: #1f2933;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .auth-header span {
            color: #667eea;
            font-weight: 600;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
        }

        .auth-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #374151;
            font-weight: 600;
        }

        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
            font-family: inherit;
        }

        .auth-form input:focus {
            border-color: #667eea;
        }

        .auth-form button {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
        }

        .auth-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
        }

        .back-home a:hover {
            color: #667eea;
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <div class="auth-header">
            <h1>Welcome to <span>HAKS SHOP</span></h1>
            <p>Please login to continue shopping</p>
        </div>

        <form id="loginForm" class="auth-form">

            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="loginEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Create Account</a>
        </div>

        <div class="back-home">
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>

    </div>

    <!-- Main JS -->
    <script src="js/main.js"></script>
</body>
</html>
